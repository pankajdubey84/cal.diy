name: Semgrep Demo Security Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep with aggressive demo rules
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/secrets
            .semgrep/demo-security-rules.yml