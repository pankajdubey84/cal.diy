rules:
  - id: demo-raw-sql-template-string
    message: "Potential SQL injection: raw SQL query built using template string."
    severity: ERROR
    languages: [javascript, typescript]
    patterns:
      - pattern-either:
          - pattern: |
              `SELECT ${...}`
          - pattern: |
              `SELECT * FROM $TABLE WHERE $FIELD = '${$INPUT}'`
          - pattern: |
              $DB.$METHOD(`SELECT ... ${$INPUT} ...`)
          - pattern: |
              $DB.query(`SELECT ... ${$INPUT} ...`)
          - pattern: |
              prisma.$queryRawUnsafe(...)
          - pattern: |
              $DB.$queryRawUnsafe(...)

  - id: demo-command-injection-exec
    message: "Command injection risk: user-controlled input may be executed by child_process."
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: exec($CMD, ...)
      - pattern: execSync($CMD, ...)
      - pattern: spawn($CMD, ...)
      - pattern: child_process.exec($CMD, ...)
      - pattern: child_process.execSync($CMD, ...)
      - pattern: require("child_process").exec($CMD, ...)

  - id: demo-ssrf-user-controlled-fetch
    message: "Potential SSRF: server-side request made to user-controlled URL."
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: fetch($URL, ...)
      - pattern: axios.get($URL, ...)
      - pattern: axios.post($URL, ...)
      - pattern: got($URL, ...)
      - pattern: request($URL, ...)

  - id: demo-path-traversal-fs
    message: "Path traversal risk: filesystem operation uses dynamic/user-controlled path."
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: fs.readFile($PATH, ...)
      - pattern: fs.readFileSync($PATH, ...)
      - pattern: fs.writeFile($PATH, ...)
      - pattern: fs.writeFileSync($PATH, ...)
      - pattern: fs.createReadStream($PATH, ...)
      - pattern: fs.createWriteStream($PATH, ...)
      - pattern: path.join(..., $INPUT)

  - id: demo-hardcoded-secret
    message: "Hardcoded secret detected."
    severity: ERROR
    languages: [javascript, typescript]
    pattern-regex: '(sk_live_|sk_test_|api[_-]?key|secret|password|token)\s*[:=]\s*["''][A-Za-z0-9_\-]{12,}["'']'

  - id: demo-insecure-cookie
    message: "Insecure cookie: missing HttpOnly/Secure/SameSite protections."
    severity: ERROR
    languages: [javascript, typescript]
    pattern-either:
      - pattern: |
          $RES.setHeader("Set-Cookie", $COOKIE)
      - pattern: |
          cookies().set($NAME, $VALUE)
      - pattern: |
          $RES.cookie($NAME, $VALUE)

  - id: demo-dangerous-html-rendering
    message: "Potential XSS: dangerous HTML rendering from dynamic input."
    severity: ERROR
    languages: [javascript, typescript, tsx, jsx]
    pattern-either:
      - pattern: |
          dangerouslySetInnerHTML={{ __html: $HTML }}
      - pattern: |
          innerHTML = $HTML